// ===== MODAL =====
function Modal({title, children, onClose, onSave, wide}) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{backgroundColor:'rgba(0,0,0,0.4)'}}>
      <div className={`bg-white rounded-xl shadow-2xl ${wide?'max-w-3xl':'max-w-lg'} w-full mx-4 max-h-screen overflow-auto`}>
        <div className="flex items-center justify-between px-6 py-4 border-b">
          <h2 className="text-lg font-semibold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div className="px-6 py-4">{children}</div>
        <div className="flex justify-end gap-3 px-6 py-4 border-t bg-gray-50 rounded-b-xl">
          <button onClick={onClose} className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border rounded-lg hover:bg-gray-50">Cancel</button>
          {onSave && <button onClick={onSave} className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">Save</button>}
        </div>
      </div>
    </div>
  );
}

// ===== LOGIN PAGE =====
function LoginPage({onLogin, lang, toggleLang}) {
  const t = k => T[lang][k]||k;
  const [email,setEmail]=useState('admin@moci.local');
  const [pass,setPass]=useState('admin123');
  const [err,setErr]=useState('');
  const handleLogin = () => {
    if(email==='admin@moci.local' && pass==='admin123') onLogin({name:'System Admin',role:'admin',email});
    else if(email==='staff@moci.local' && pass==='staff123') onLogin({name:'Ahmed Staff',role:'staff',email});
    else setErr('Invalid email or password');
  };
  return (
    <div dir={T[lang].dir} className="min-h-screen flex items-center justify-center" style={{background:'linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#60a5fa 100%)'}}>
      <div className="absolute top-4 right-4">
        <button onClick={toggleLang} className="px-4 py-2 bg-white bg-opacity-20 text-white rounded-lg text-sm font-medium hover:bg-opacity-30">
          {lang==='en'?'عربي':'English'}
        </button>
      </div>
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <span className="text-3xl">🏭</span>
          </div>
          <h1 className="text-2xl font-bold text-gray-800">{t('appName')}</h1>
          <p className="text-gray-500 text-sm mt-1">{t('login')}</p>
        </div>
        {err && <div className="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm mb-4">{err}</div>}
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{t('email')}</label>
            <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr('')}}
              className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
              placeholder="admin@moci.local"/>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{t('password')}</label>
            <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('')}}
              className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
              onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
          </div>
          <button onClick={handleLogin}
            className="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
            {t('signIn')}
          </button>
        </div>
        <div className="mt-6 p-3 bg-gray-50 rounded-lg text-xs text-gray-500 text-center">
          Demo: admin@moci.local / admin123
        </div>
      </div>
    </div>
  );
}

function BillingPage({t, lang}) {
  const [viewInv,setViewInv]=useState(null);

  const paidTotal = INVOICES.filter(i=>i.status==='Paid').reduce((s,i)=>s+i.totalAmount,0);
  const pendingTotal = INVOICES.filter(i=>i.status==='Draft'||i.status==='Sent').reduce((s,i)=>s+i.totalAmount,0);
  const overdueTotal = INVOICES.filter(i=>i.status==='Overdue').reduce((s,i)=>s+i.totalAmount,0);
  return (
    <div className="fade-in">

        <div className="stat-card bg-white rounded-xl shadow-sm border p-5"><p className="text-sm text-red-600">{t('totalOverdue')}</p><p className="text-2xl font-bold text-red-700 mt-1">{overdueTotal.toLocaleString()} {t('sar')}</p></div>

          </tr></thead>
          <tbody className="divide-y divide-gray-100">

              <tr key={inv.id} className="hover:bg-gray-50">
                <td className="px-4 py-3 font-mono text-blue-700 font-medium">{inv.invoiceNumber}</td>

            </table>
            <div className="flex justify-end">
              <div className="w-64 text-sm space-y-1">
                <div className="flex justify-between"><span>{t('subtotal')}:</span><span>{viewInv.subtotal.toLocaleString()}</span></div>

              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );

  const adminItems = [{key:'auditLogs',page:'audit',icon:'📋'},{key:'users',icon:'👥'}];

  const pages = {
    dashboard: <DashboardPage t={t} lang={lang}/>,
    products: <ProductsPage t={t} lang={lang} isAdmin={isAdmin}/>,
    warehouses: <WarehousesPage t={t} isAdmin={isAdmin}/>,
    transactions: <TransactionsPage t={t} lang={lang}/>,
    billing: <BillingPage t={t} lang={lang}/>,
    integration: <IntegrationPage t={t}/>,
    audit: <AuditPage t={t} lang={lang}/>,
    users: <UsersPage t={t}/>,
  };

  return (
    <div dir={dir} className="min-h-screen bg-gray-50">
      <aside className="fixed top-0 left-0 h-full w-64 bg-white shadow-lg z-30">
        <div className="p-4 border-b"><h1 className="text-xl font-bold text-blue-700">{t('appName')}</h1></div>
        <nav className="mt-4 px-2">
          {navItems.map(item=>(
            <button key={item.key} onClick={()=>setPage(item.page||item.key)}
              className={`flex items-center w-full px-4 py-3 mb-1 rounded-lg text-sm font-medium transition-colors ${page===(item.page||item.key)?'bg-blue-50 text-blue-700':'text-gray-600 hover:bg-gray-100'}`}>
              <span className="text-lg">{item.icon}</span><span className="ml-3">{t(item.key)}</span>
            </button>
          ))}
          {isAdmin && <>
            <hr className="my-3 border-gray-200"/>
            {adminItems.map(item=>(
              <button key={item.key} onClick={()=>setPage(item.page||item.key)}
                className={`flex items-center w-full px-4 py-3 mb-1 rounded-lg text-sm font-medium transition-colors ${page===(item.page||item.key)?'bg-blue-50 text-blue-700':'text-gray-600 hover:bg-gray-100'}`}>
                <span className="text-lg">{item.icon}</span><span className="ml-3">{t(item.key)}</span>
              </button>
            ))}
          </>}
        </nav>
      </aside>
      <div className="ml-64">
        <header className="bg-white shadow-sm border-b sticky top-0 z-20">
          <div className="flex items-center justify-between px-6 py-3">
            <span className="text-sm text-gray-500">{t('welcome')}, {user.name}</span>
            <div className="flex items-center gap-3">
              <button onClick={toggleLang} className="px-3 py-1.5 text-sm font-medium rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700">
                {lang==='en'?'عربي':'English'}
              </button>
              <span className="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-700 font-medium">{t(user.role)}</span>
              <button onClick={()=>setUser(null)} className="px-3 py-1.5 text-sm text-red-600 hover:bg-red-50 rounded-lg">{t('logout')}</button>
            </div>
          </div>
        </header>
        <main className="p-6">{pages[page]}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
